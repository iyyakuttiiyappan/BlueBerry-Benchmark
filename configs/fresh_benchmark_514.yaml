project_name: silal_blueberry_multitask_benchmark_514
data_root: data/combined_514
output_root: outputs/fresh_benchmark_514

classes:
  - green_immature
  - pale_pink
  - pink_turns_purple
  - fully_ripe
  - over_ripe

paths:
  image_dir: images
  count_workbook: Image Wise Classname Count.xlsx
  binary_mask_aliases: ["ALL", "All", "all", "Overall", "overall"]
  fixed_split_manifest: metadata/dataset_manifest.csv

split:
  train: 0.70
  val: 0.15
  test: 0.15
  seed: 42

annotation:
  image_extensions: [".jpg", ".jpeg", ".png", ".tif", ".tiff"]
  mask_threshold: 127
  min_component_area: 64
  crop_padding: 0.18
  crop_min_size: 20
  save_overlay_count: 12
  yolo_image_size: 1024

training:
  seed: 42
  epochs: 40
  quick_epochs: 2
  batch_size: 8
  num_workers: 4
  lr: 0.0003
  weight_decay: 0.05
  early_stopping_patience: 8
  amp: true
  pretrained: true
  grad_clip_norm: 1.0

ours:
  method: berrymtl_unified
  display_name: BerryMTL-ConvNeXtV2 (ours)
  model_name: convnextv2_tiny.fcmae_ft_in22k_in1k
  image_size: 512
  batch_size: 4
  epochs: 60
  early_stopping_patience: 8
  lr: 0.0003
  weight_decay: 0.05
  count_loss_weight: 0.04
  dice_loss_weight: 0.6
